<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VibeExtract — Export</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      padding: 20px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .topbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -0.4px;
    }
    .topbar .subtitle {
      font-size: 12px;
      color: #52525b;
      margin-top: 1px;
    }
    .source-url {
      font-size: 11px;
      color: #3f3f46;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    .tab-bar {
      margin: 20px 32px 0;
      display: flex;
      gap: 2px;
      border-bottom: 1px solid #1f1f23;
    }
    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #52525b;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      position: relative;
      transition: color 0.15s;
    }
    .tab:hover {
      color: #a1a1aa;
    }
    .tab.active {
      color: #e4e4e7;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #6366f1;
      border-radius: 2px 2px 0 0;
    }
    .tab .tab-badge {
      font-size: 9px;
      font-weight: 600;
      color: #6366f1;
      background: rgba(99, 102, 241, 0.12);
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* ── Content area ── */
    .content {
      flex: 1;
      margin: 0 32px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      padding: 16px 0;
    }
    .panel.active {
      display: flex;
    }

    /* ── Code view ── */
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .code-meta {
      font-size: 11px;
      color: #3f3f46;
      font-family: SF Mono, Menlo, Consolas, monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .code-meta .font-name {
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.08);
      padding: 2px 8px;
      border-radius: 5px;
    }
    .code-wrap {
      flex: 1;
      min-height: 0;
      background: #111113;
      border: 1px solid #1f1f23;
      border-radius: 10px;
      overflow: auto;
      position: relative;
    }
    .code-wrap pre {
      padding: 20px 24px;
      font-family: SF Mono, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.65;
      color: #a1a1aa;
      white-space: pre;
      tab-size: 2;
      margin: 0;
    }

    /* ── Preview ── */
    .preview-frame {
      border: 1px solid #1f1f23;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .preview-frame iframe {
      width: 100%;
      min-height: 70vh;
      border: none;
      display: block;
    }

    /* ── Action bar (bottom) ── */
    .action-bar {
      padding: 16px 32px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dl-btn {
      padding: 10px 22px;
      border-radius: 9px;
      border: 1px solid #27272a;
      background: #141416;
      color: #e4e4e7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dl-btn:hover {
      background: #1c1c1f;
      border-color: #3f3f46;
    }
    .dl-btn:active {
      transform: scale(0.97);
    }
    .dl-btn .dl-icon {
      font-size: 15px;
      opacity: 0.5;
    }
    .dl-btn-primary {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border-color: transparent;
      color: #fff;
    }
    .dl-btn-primary:hover {
      background: linear-gradient(135deg, #7577f5, #8b5cf6);
      border-color: transparent;
    }
    .action-spacer {
      flex: 1;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #18181b;
      border: 1px solid #27272a;
      color: #e4e4e7;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast .toast-icon {
      color: #22c55e;
    }

    /* ── Copy button (inside code view) ── */
    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #71717a;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: all 0.15s;
      z-index: 2;
    }
    .copy-btn:hover {
      background: #27272a;
      color: #a1a1aa;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #27272a;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">V</div>
      <div>
        <h1>Export</h1>
        <div class="subtitle">Pick a format, then download.</div>
      </div>
    </div>
    <div class="source-url" id="source-url"></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" data-tab="preview">Preview</button>
    <button class="tab" data-tab="html">HTML</button>
    <button class="tab" data-tab="toon">TOON <span class="tab-badge">LLM</span></button>
  </div>

  <!-- Panels -->
  <div class="content">
    <!-- Preview -->
    <div class="panel active" id="panel-preview">
      <div class="preview-frame">
        <iframe id="preview-iframe" sandbox="allow-same-origin"></iframe>
      </div>
    </div>

    <!-- HTML -->
    <div class="panel" id="panel-html">
      <div class="code-header">
        <div class="code-meta" id="html-meta"></div>
      </div>
      <div class="code-wrap">
        <button class="copy-btn" data-copy="html">Copy</button>
        <pre id="html-code"></pre>
      </div>
    </div>

    <!-- TOON -->
    <div class="panel" id="panel-toon">
      <div class="code-header">
        <div class="code-meta" id="toon-meta"></div>
      </div>
      <div class="code-wrap">
        <button class="copy-btn" data-copy="toon">Copy</button>
        <pre id="toon-code"></pre>
      </div>
    </div>
  </div>

  <!-- Bottom action bar -->
  <div class="action-bar">
    <button class="dl-btn" id="dl-html">
      <span class="dl-icon">&darr;</span>
      Save .html
    </button>
    <button class="dl-btn" id="dl-toon">
      <span class="dl-icon">&darr;</span>
      Save .toon
    </button>
    <div class="action-spacer"></div>
    <button class="dl-btn dl-btn-primary" id="dl-both">
      <span class="dl-icon">&darr;</span>
      Save Both
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">&#10003;</span>
    <span id="toast-text">Saved</span>
  </div>

  <script src="export.js"></script>
</body>
</html>
